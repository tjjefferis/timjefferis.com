---
layout: default
---
<div class="container" style="max-width: 800px; margin: 0 auto; padding: 40px 20px;">
  <a href="{{ '/blog/' | relative_url }}" style="color: #E74011; text-decoration: none; font-weight: 600;">&larr; Back to Blog</a>
  
  <article style="margin-top: 30px;">
    <header style="margin-bottom: 30px; border-bottom: 1px solid #edf2f7; padding-bottom: 20px;">
      <h1 style="font-family: 'Georgia', serif; font-size: 2.5rem; color: #00331D; margin: 0 0 10px 0;">{{ page.title }}</h1>
      <div style="font-size: 0.9rem; color: #718096;">
        📅 {{ page.date | date: "%B %d, %Y" }}
      </div>
    </header>

  <!-- Google Site Search Widget -->
  <div class="site-search-wrapper" style="margin: 0 auto 30px auto; max-width: 100%; width: 100%;">
    <form action="https://www.google.com/search" method="get" style="display: flex; gap: 8px; width: 100%;">
      <input type="hidden" name="sitesearch" value="timjefferis.com">
      <input type="text" name="q" placeholder="Search this site..." required 
             style="flex: 1; padding: 10px 14px; border: 1.5px solid #7F9C90; border-radius: 6px; font-family: inherit; font-size: 0.95em; outline: none; transition: border-color 0.2s; background: #FFF;"
             onfocus="this.style.borderColor='#00331D'" onblur="this.style.borderColor='#7F9C90'">
      <button type="submit" 
              style="background-color: #00331D; color: #F8FAF8; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: bold; transition: background-color 0.2s;"
              onmouseover="this.style.backgroundColor='#7F9C90'" onmouseout="this.style.backgroundColor='#00331D'">
        Search
      </button>
    </form>
  </div>
  <!-- End Google Site Search Widget -->


    <div class="post-content" style="font-family: 'Georgia', serif; font-size: 1.15rem; line-height: 1.8; color: #2d3748; margin-bottom: 50px;">
      {{ content }}
    </div>
  </article>

  <!-- Disqus Comments Section -->
  {% if page.comments != false %}
  <hr style="border: 0; border-top: 1px solid #edf2f7; margin: 40px 0;" />
  <div id="disqus_thread"></div>
  <script>
      var disqus_config = function () {
          this.page.url = "{{ page.url | absolute_url }}";
          this.page.identifier = "{{ page.url }}";
      };
      (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://tjjteachersblog.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
      })();
  </script>
  <noscript>Please enable JavaScript to view the comments.</noscript>
  {% endif %}
</div>
